version: "3.9"

services:

  backend:
    build: .
    container_name: memoryai_backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - mysql
      - redis
      - qdrant

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: memoryai
      DB_USER: root
      DB_PASSWORD: root


  mysql:
    image: mysql:8

    container_name: memoryai_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: memoryai

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql


  redis:
    image: redis

    container_name: memoryai_redis

    ports:
      - "6379:6379"


  qdrant:
    image: qdrant/qdrant

    container_name: memoryai_qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage


volumes:

  mysql_data:

  qdrant_data: